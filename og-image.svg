<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 630 1200" width="630" height="1200">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4785A"/>
      <stop offset="52%" stop-color="#C4688A"/>
      <stop offset="100%" stop-color="#7B95B8"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#D4785A" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#0E0D0D" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="630" height="1200" fill="#0E0D0D"/>

  <!-- Ambient orbs -->
  <ellipse cx="100" cy="200" rx="280" ry="280" fill="rgba(212,120,90,0.12)"/>
  <ellipse cx="530" cy="150" rx="240" ry="240" fill="rgba(196,104,138,0.10)"/>
  <ellipse cx="315" cy="700" rx="300" ry="300" fill="rgba(123,149,184,0.09)"/>
  <ellipse cx="80" cy="950" rx="220" ry="220" fill="rgba(212,120,90,0.10)"/>
  <ellipse cx="560" cy="1050" rx="200" ry="200" fill="rgba(196,104,138,0.09)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="630" height="5" fill="url(#grad)"/>

  <!-- Hat -->
  <rect x="195" y="300" width="240" height="22" rx="11" fill="url(#grad)" opacity="0.9"/>
  <polygon points="315,195 435,255 315,297 195,255" fill="url(#grad)" opacity="0.9"/>
  <!-- Tassel -->
  <line x1="426" y1="255" x2="436" y2="308" stroke="#C4688A" stroke-width="3.5" stroke-linecap="round"/>
  <circle cx="436" cy="315" r="8" fill="#C4688A"/>
  <line x1="436" y1="323" x2="428" y2="345" stroke="#C4688A" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="436" y1="323" x2="436" y2="347" stroke="#C4688A" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="436" y1="323" x2="444" y2="345" stroke="#C4688A" stroke-width="2.5" stroke-linecap="round"/>

  <!-- STUDENTFIXARNA -->
  <text x="315" y="415" text-anchor="middle" font-family="'Arial Black','Helvetica Neue',sans-serif" font-weight="900" font-size="44" letter-spacing="-1" fill="url(#grad)">STUDENTFIXARNA</text>

  <!-- Divider -->
  <rect x="115" y="432" width="400" height="2" rx="1" fill="url(#grad)" opacity="0.35"/>

  <!-- Tagline -->
  <text x="315" y="474" text-anchor="middle" font-family="Arial,sans-serif" font-size="18" font-weight="400" fill="#8C8077" letter-spacing="1.5">FRÅN IDÉ TILL LEGENDARISK STUDENT</text>

  <!-- Main headline -->
  <text x="315" y="585" text-anchor="middle" font-family="'Arial Black','Helvetica Neue',sans-serif" font-weight="900" font-size="78" letter-spacing="-2" fill="#F5EFE6">En grym</text>
  <text x="315" y="672" text-anchor="middle" font-family="'Arial Black','Helvetica Neue',sans-serif" font-weight="900" font-size="78" letter-spacing="-2" fill="#F5EFE6">student.</text>
  <text x="315" y="768" text-anchor="middle" font-family="'Arial Black','Helvetica Neue',sans-serif" font-weight="900" font-size="66" letter-spacing="-2" fill="url(#grad)">Klasskassan</text>
  <text x="315" y="844" text-anchor="middle" font-family="'Arial Black','Helvetica Neue',sans-serif" font-weight="900" font-size="66" letter-spacing="-2" fill="url(#grad)">tackar.</text>

  <!-- Sub -->
  <text x="315" y="918" text-anchor="middle" font-family="Arial,sans-serif" font-size="25" fill="#C9BFB2">Vi tar hand om allt.</text>
  <text x="315" y="952" text-anchor="middle" font-family="Arial,sans-serif" font-size="25" fill="#C9BFB2">Ni behåller pengarna.</text>
  <text x="315" y="986" text-anchor="middle" font-family="Arial,sans-serif" font-size="25" fill="#C9BFB2">Så enkelt är det.</text>

  <!-- URL pill -->
  <rect x="190" y="1060" width="250" height="48" rx="24" fill="url(#grad)"/>
  <text x="315" y="1089" text-anchor="middle" font-family="Arial,sans-serif" font-weight="700" font-size="18" fill="#0E0D0D">studentfixarna.se</text>

  <!-- Bottom accent -->
  <rect x="0" y="1195" width="630" height="5" fill="url(#grad)"/>
</svg>
