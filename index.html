<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Studentfixarna – Kommer snart</title>
<meta name="description" content="Studentfixarna – Studentfesten på era villkor. Kommer snart.">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --grad: linear-gradient(135deg, #D4785A 0%, #C4688A 52%, #7B95B8 100%);
  --bg:   #080706;
  --text: #F5EFE6;
  --text2:#C9BFB2;
  --muted:#8C8077;
  --border: rgba(255,240,220,0.12);
}

html, body {
  min-height: 100%;
  font-family: 'Plus Jakarta Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
}

/* Page lights */
.lights {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
}
.orb {
  position: absolute;
  border-radius: 50%;
  animation: float var(--d,12s) ease-in-out infinite;
  animation-delay: var(--dl,0s);
}
@keyframes float {
  0%,100% { opacity:var(--o1,.14); transform:translate(0,0) scale(1); }
  50%      { opacity:var(--o2,.24); transform:translate(var(--mx,0px),var(--my,0px)) scale(1.15); }
}

/* Main */
main {
  position: relative;
  z-index: 1;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 3rem 1.5rem 2rem;
}

.logo {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: clamp(1rem, 4vw, 1.4rem);
  letter-spacing: -0.02em;
  background: var(--grad);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 3.5rem;
  animation: fadeUp .8s ease both;
}

.badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(255,240,220,0.06);
  border: 1px solid var(--border);
  padding: .3rem .9rem;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 1.75rem;
  animation: fadeUp .8s .1s ease both;
}

.badge-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--grad);
  display: inline-block;
}

h1 {
  font-family: 'Syne', sans-serif;
  font-size: clamp(2.4rem, 9vw, 6rem);
  font-weight: 800;
  line-height: 1.0;
  letter-spacing: -0.04em;
  color: var(--text);
  margin-bottom: .6rem;
  animation: fadeUp .8s .2s ease both;
}

.grad-text {
  background: var(--grad);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  display: block;
}

.sub {
  font-size: clamp(.9rem, 2.5vw, 1.1rem);
  color: var(--text2);
  max-width: 420px;
  line-height: 1.7;
  margin: 0 auto 2.5rem;
  animation: fadeUp .8s .3s ease both;
}

.divider {
  width: 40px;
  height: 2px;
  background: var(--grad);
  margin: 0 auto 2.5rem;
  animation: fadeUp .8s .35s ease both;
}

.contact {
  font-size: 13px;
  color: var(--muted);
  animation: fadeUp .8s .4s ease both;
}
.contact a {
  color: var(--text2);
  text-decoration: none;
  font-weight: 600;
  transition: color .2s;
}
.contact a:hover { color: var(--text); }

/* Socials */
.socials {
  display: flex;
  gap: .75rem;
  justify-content: center;
  margin-top: 1.25rem;
  animation: fadeUp .8s .5s ease both;
}
.social-btn {
  display: inline-flex;
  align-items: center;
  gap: .4rem;
  background: var(--grad);
  color: #080808;
  font-size: 12px;
  font-weight: 700;
  padding: .45rem 1.1rem;
  text-decoration: none;
  font-family: 'Plus Jakarta Sans', sans-serif;
  transition: opacity .15s, transform .15s;
}
.social-btn:hover { opacity: .88; transform: translateY(-1px); }

/* Footer */
footer {
  position: relative;
  text-align: center;
  font-size: 11px;
  color: var(--muted);
  margin-top: 2rem;
  animation: fadeUp .8s .6s ease both;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}


</style>
</head>
<body>

<!-- Ambient lights -->
<div class="lights">
  <div class="orb" style="width:400px;height:400px;background:radial-gradient(circle,rgba(212,120,90,.9),transparent);top:-80px;left:-80px;filter:blur(60px);--d:13s;--dl:0s;--o1:.14;--o2:.24;--mx:50px;--my:60px"></div>
  <div class="orb" style="width:360px;height:360px;background:radial-gradient(circle,rgba(196,104,138,.9),transparent);top:-60px;right:-60px;filter:blur(55px);--d:11s;--dl:1s;--o1:.12;--o2:.22;--mx:-60px;--my:50px"></div>
  <div class="orb" style="width:320px;height:320px;background:radial-gradient(circle,rgba(123,149,184,.9),transparent);bottom:-60px;left:30%;filter:blur(50px);--d:10s;--dl:2s;--o1:.11;--o2:.20;--mx:40px;--my:-40px"></div>
</div>

<main>
  <div class="logo">STUDENTFIXARNA™</div>

  <div class="badge"><span class="badge-dot"></span>Kommer snart</div>

  <div class="divider"></div>

  <div class="socials">

</body>
</html>
