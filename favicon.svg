<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4785A"/>
      <stop offset="55%" stop-color="#C47A8A"/>
      <stop offset="100%" stop-color="#7B95B8"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="120" height="120" rx="26" fill="#1E1B18"/>
  <!-- Hat brim -->
  <rect x="22" y="62" width="76" height="10" rx="5" fill="url(#g)"/>
  <!-- Hat top -->
  <polygon points="60,30 98,54 60,66 22,54" fill="url(#g)"/>
  <!-- Tassel string -->
  <line x1="91" y1="54" x2="95" y2="76" stroke="#C47A8A" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Tassel bob -->
  <circle cx="95" cy="80" r="4" fill="#C47A8A"/>
  <!-- Tassel fringe -->
  <line x1="95" y1="84" x2="91" y2="94" stroke="#C47A8A" stroke-width="2" stroke-linecap="round"/>
  <line x1="95" y1="84" x2="95" y2="95" stroke="#C47A8A" stroke-width="2" stroke-linecap="round"/>
  <line x1="95" y1="84" x2="99" y2="94" stroke="#C47A8A" stroke-width="2" stroke-linecap="round"/>
</svg>
