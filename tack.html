<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tack – Studentfixarna</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Plus Jakarta Sans', sans-serif;
  background: #1E1B18;
  color: #F5EFE6;
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
  text-align: center;
  padding: 20px;
}

.card {
  max-width: 520px;
  background: #2C2720;
  border: 1px solid rgba(255,240,220,0.12);
  border-radius: 18px;
  padding: 2.5rem 2rem;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}

h1 {
  font-family: 'Syne', sans-serif;
  font-size: 2rem;
  margin-bottom: .6rem;
}

p {
  color: #C9BFB2;
  line-height: 1.7;
  font-size: 15px;
}

.highlight {
  background: linear-gradient(135deg,#D4785A,#C47A8A,#7B95B8);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  font-weight: 800;
}

.btn {
  margin-top: 1.8rem;
  display: inline-block;
  padding: .85rem 1.6rem;
  border-radius: 999px;
  background: linear-gradient(135deg,#D4785A,#C47A8A,#7B95B8);
  color: #1E1B18;
  text-decoration: none;
  font-weight: 800;
  transition: transform .2s;
}

.btn:hover {
  transform: translateY(-2px);
}
</style>
</head>

<body>

<div class="card">
  <h1>Tack! 🎉</h1>

  <p>
    Vi har tagit emot er förfrågan.
  </p>

  <p>
    Vad kul att det är <span class="highlight">studentplaner på gång</span> – det här kommer bli riktigt bra.
  </p>

  <p>
    Vi återkommer inom <b>24 timmar</b> med ett upplägg anpassat för er klass.
  </p>

  <a class="btn" href="/">Tillbaka till startsidan</a>
</div>

</body>
</html>
